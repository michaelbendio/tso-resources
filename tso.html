<meta charset="UTF-8">
<title>TSO Resources</title>

<!-- ===== APP CSS START ===== -->
<style>
body { font-family: -apple-system, sans-serif; margin:0; padding:0; font-size:18px; line-height:1.45; }
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  background:#003366;
  color:white;
}

.topbar .title {
  font-size:20px;
  font-weight:600;
}

.topbar .tabs {
  display:flex;
  gap:24px;
}

.topbar .tabs span {
  cursor:pointer;
  opacity:.9;
}

.topbar .tabs span:hover {
  opacity:1;
}

.hidden { display:none; }
.grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); }
.category-card, .resource-card { border:1px solid #ddd; padding:12px; border-radius:6px; background:white; }
.resource-card { position:relative; }
.star { position:absolute; left:8px; top:8px; cursor:pointer; font-size:18px; }
.star.fav { color:gold; }
.resource-main { margin-left:24px; }
.resource-details.collapsed { display:none; }
.button { padding:10px 14px; margin:4px 0; cursor:pointer; }
button,
input,
select,
textarea {
  font-size: 18px;
}
.button.primary { background:#003366; color:white; }
.button.danger { background:#aa0000; color:white; }
textarea.big { width:100%; min-height:80px; }
textarea.services-editor { min-height:320px; resize:vertical; }
.services-hint { font-size:12px; color:#555; margin-top:6px; }
.services-preview-toggle { margin-top:8px; display:flex; gap:8px; }
.services-preview-box {
  margin-top:8px;
  border:1px solid #ddd;
  border-radius:6px;
  padding:10px;
  background:#fff;
}
.services-rendered ul { margin:6px 0 6px 20px; }
.services-rendered .services-line { margin:0; }
.services-rendered .services-blank { min-height:1.1em; }
.services-rendered hr { border:0; border-top:1px solid #ccc; margin:10px 0; }
.admin-panel { display:flex; gap:20px; }
.admin-box { flex:1; border:1px solid #ddd; padding:12px; }
.category-grid { display:grid; gap:6px; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); }
.reviewed-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.reviewed-value { font-weight:600; }
.review-edit { display:none; margin-top:6px; }
.review-edit.active { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.resource-browse-wrap { width:min(860px,100%); }
.resource-listbox { width:100%; box-sizing:border-box; }
.resource-browse-actions { margin-top:8px; display:flex; gap:8px; align-items:center; width:100%; }
.resource-browse-actions .spacer { flex:1; }
.resource-editor-grid {
  display:grid;
  gap:10px;
  grid-template-columns:repeat(3, minmax(0, 1fr));
}
.resource-editor-grid .span-2 { grid-column:span 2; }
.resource-editor-grid label input,
.resource-editor-grid label textarea { width:100%; box-sizing:border-box; }
#res_name { text-align:left; width:100%; box-sizing:border-box; }
.reviewed-warning { color:#aa0000; font-size:13px; margin-top:4px; min-height:1.1em; }
.tag-controls-row { margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.assigned-tags-line { font-size:14px; }

/* Print modal */
#printModal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  justify-content:center;
  align-items:center;
}
#printModal.hidden { display:none; }
#printContentWrapper {
  background:white;
  padding:20px;
  max-height:90%;
  overflow:auto;
  width:800px;
}
@media print {
  @page {
    margin: 0.75in;
  }

  body {
    background: white;
  }

  body > *:not(#printModal) {
    display: none !important;
  }

  #printModal {
    position: static;
    inset: auto;
    background: transparent;
    display: block;
  }

  #printContentWrapper {
    position: static;
    left: auto;
    top: auto;
    width: auto;
    max-height: none;
    overflow: visible;
    padding: 0;
    margin: 0;
    background: transparent;
    font-size: 11pt;
    line-height: 1.3;
  }

  #printContentWrapper button {
    display: none !important;
  }

  .resource-card {
    border: none;
    padding: 0;
    margin-bottom: 11pt;
    break-inside: avoid;
    page-break-inside: avoid;
    background: transparent;
  }

  .resource-card ul {
    margin-top: 4pt;
    margin-bottom: 4pt;
    padding-left: 14pt;
  }
}
</style>
<!-- ===== APP CSS END ===== -->
</head>

<body>

<div id="appErrorBanner" style="display:none; position:fixed; top:0; left:0; right:0; background:#ffd9d9; border-bottom:2px solid #c00; z-index:9999; padding:10px; font-size:16px;">
  <strong>TSO Resources error</strong>
  <pre id="appErrorDetails" style="white-space:pre-wrap;"></pre>
  <button class="button" id="appErrorCopy">Copy</button>
  <button class="button" id="appErrorDismiss">Dismiss</button>
</div>

<div class="topbar">
  <div class="title">TSO Resources</div>
  <div class="tabs">
    <span id="tabCategories">Categories</span>
    <span id="tabFavorites">Favorites (0)</span>
    <span id="tabAdmin">Admin</span>
  </div>
</div>

<div id="appView"></div>
<div id="adminView" class="hidden"></div>

<div id="selfTestPanel" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#f5f5f5; border-top:2px solid #888; padding:10px; font-size:14px; max-height:250px; overflow:auto;">
  <strong>TSO Self Tests</strong>
  <div id="selfTestResults"></div>
  <button class="button" id="selfTestClose">Close</button>
</div>

<div id="printModal" class="hidden">
  <div id="printContentWrapper">
    <button class="button" onclick="closePrintPreview()">Close</button>
    <button class="button primary" onclick="doPrint()">Print</button>
    <div id="printContent"></div>
  </div>
</div>

<script>
// ============================================================
// UTILITIES
// ============================================================

function nowISO(){ return new Date().toISOString(); }
function escapeHTML(str){ return (str||"").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;" }[m])); }
function generateResourceId(){
  const bytes = new Uint8Array(16);
  crypto.getRandomValues(bytes);
  return Array.from(bytes)
    .map(b => b.toString(16).padStart(2,"0"))
    .join("");
}

// ============================================================
// DATA NORMALIZATION
// ============================================================

function normalizeResourceServices(r){
  if(Array.isArray(r.services)){
    r.servicesText = r.services.join("\n");
    delete r.services;
    return true;
  }
  if(!r.servicesText) r.servicesText = "";
  return false;
}

function normalizeResourceReviewedOn(r){
  if(!r || typeof r !== "object") return;
  r.reviewedOn = coerceReviewedOnToMMYY(r.reviewedOn);
}

function normalizeDataServicesShape(data){
  if(!data.resources) return;
  data.resources.forEach(normalizeResourceServices);
}

function normalizeDataReviewedOnShape(nextData){
  if(!nextData || !Array.isArray(nextData.resources)) return;
  nextData.resources.forEach(normalizeResourceReviewedOn);
}

function formatMMYYFromDate(d){
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${yy}`;
}

function parseMMYYToMonthIndex(mmyy){
  const match = String(mmyy || "").trim().match(/^(0[1-9]|1[0-2])\/(\d{2})$/);
  if(!match) return null;
  const month = Number(match[1]);
  const yy = Number(match[2]);
  const year = 2000 + yy;
  return year * 12 + (month - 1);
}

function isValidMMYY(value){
  return parseMMYYToMonthIndex(value) !== null;
}

function formatReviewedOnForDisplay(reviewedOn){
  return isValidMMYY(reviewedOn) ? String(reviewedOn).trim() : "not reviewed";
}

function parseLegacyReviewedOnToMMYY(raw){
  const text = String(raw || "").trim();
  if(!text) return null;

  const mmyy = text.match(/^(\d{1,2})[\/\-](\d{2})$/);
  if(mmyy){
    const month = Number(mmyy[1]);
    const yy = Number(mmyy[2]);
    if(month >= 1 && month <= 12) return `${String(month).padStart(2,"0")}/${String(yy).padStart(2,"0")}`;
  }

  const withYear = text.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2}|\d{4})$/);
  if(withYear){
    const month = Number(withYear[1]);
    const yearRaw = withYear[3];
    if(month >= 1 && month <= 12){
      const yy = yearRaw.length === 4 ? Number(yearRaw.slice(-2)) : Number(yearRaw);
      return `${String(month).padStart(2,"0")}/${String(yy).padStart(2,"0")}`;
    }
  }

  const compact = text.match(/^(\d{2})(\d{2})(\d{2})$/);
  if(compact){
    const month = Number(compact[1]);
    const yy = Number(compact[3]);
    if(month >= 1 && month <= 12) return `${compact[1]}/${String(yy).padStart(2,"0")}`;
  }

  if(/^\d{4}-\d{2}-\d{2}$/.test(text)){
    const isoDate = new Date(`${text}T00:00:00`);
    if(!Number.isNaN(isoDate.getTime())) return formatMMYYFromDate(isoDate);
  }

  const parsed = new Date(text);
  if(!Number.isNaN(parsed.getTime())) return formatMMYYFromDate(parsed);
  return null;
}

function coerceReviewedOnToMMYY(value){
  if(value == null) return null;
  const text = String(value).trim();
  if(!text) return null;
  if(isValidMMYY(text)) return text;
  const parsed = parseLegacyReviewedOnToMMYY(text);
  return parsed && isValidMMYY(parsed) ? parsed : null;
}

function validateReviewedOnInput(value){
  const text = String(value || "").trim();
  if(!text) return { valid:true, normalized:null, message:"" };
  if(!isValidMMYY(text)){
    return { valid:false, normalized:null, message:"Use MM/YY (MM 01-12)." };
  }
  return { valid:true, normalized:text, message:"" };
}

function compareResourcesByName(a, b){
  return String((a && a.name) || "").localeCompare(String((b && b.name) || ""), undefined, { sensitivity:"base" });
}

function getAdminResourceBrowseList(){
  const resources = data.resources.slice();
  if(!adminShowReviewDates){
    return resources.sort(compareResourcesByName);
  }
  return resources.sort((a, b) => {
    const aMonth = parseMMYYToMonthIndex(a.reviewedOn);
    const bMonth = parseMMYYToMonthIndex(b.reviewedOn);
    const aReviewed = aMonth !== null;
    const bReviewed = bMonth !== null;
    if(aReviewed !== bReviewed) return aReviewed ? -1 : 1;
    if(aReviewed && bReviewed && aMonth !== bMonth) return aMonth - bMonth;
    return compareResourcesByName(a, b);
  });
}

function buildAdminDeleteConfirmation(kind, name){
  if(kind === "resource"){
    return [
      `Are you sure you want to delete the resource '${name}'?`,
      "",
      "This removes it from all categories and Favorites.",
      "Undo will be available in Admin to restore what you deleted."
    ].join("\n");
  }
  if(kind === "category"){
    return [
      `Are you sure you want to delete the category '${name}'?`,
      "",
      "Resources are not deleted, but they will no longer appear under this category.",
      "Undo will be available in Admin to restore what you deleted."
    ].join("\n");
  }
  return "Are you sure?";
}

function normalizeDataTagsShape(nextData){
  if(!nextData || typeof nextData !== "object") return;
  if(!Array.isArray(nextData.tags)) nextData.tags = [];

  // Keep tags unique case-insensitively while preserving first-seen casing.
  const seen = new Set();
  nextData.tags = nextData.tags
    .map(t => String(t || "").trim())
    .filter(t => {
      if(!t) return false;
      const key = t.toLowerCase();
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });

  if(!Array.isArray(nextData.resources)) return;
  nextData.resources.forEach(r => {
    if(!Array.isArray(r.tags)) r.tags = [];
    const used = new Set();
    r.tags = r.tags
      .map(t => String(t || "").trim())
      .filter(t => {
        if(!t) return false;
        const key = t.toLowerCase();
        if(used.has(key)) return false;
        used.add(key);
        return true;
      });
  });
}

function applyServicesBold(escapedText){
  return escapedText.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
}

function renderServicesHTML(text){
  const normalized = String(text || "").replace(/\r\n?/g, "\n");
  const lines = normalized.split("\n");
  const out = [];
  let listItems = [];

  function flushList(){
    if(!listItems.length) return;
    out.push(`<ul>${listItems.join("")}</ul>`);
    listItems = [];
  }

  lines.forEach(line => {
    const trimmed = line.trim();
    const isDivider = trimmed === "---";
    const isBullet = line.startsWith("* ");

    if(isDivider){
      flushList();
      out.push("<hr>");
      return;
    }

    if(isBullet){
      const bulletText = applyServicesBold(escapeHTML(line.slice(2)));
      listItems.push(`<li>${bulletText}</li>`);
      return;
    }

    flushList();
    if(line === ""){
      out.push('<div class="services-line services-blank">&nbsp;</div>');
      return;
    }
    out.push(`<div class="services-line">${applyServicesBold(escapeHTML(line))}</div>`);
  });

  flushList();
  return out.join("");
}

// ============================================================
// STATE
// ============================================================

const seed = JSON.parse(document.getElementById("seed-data").textContent);
let data = JSON.parse(localStorage.getItem("tsoData") || "null");
const DEBUG = new URLSearchParams(location.search).has("debug");

if(!data){
  data = seed;
  localStorage.setItem("tsoData", JSON.stringify(data));
}

normalizeDataServicesShape(data);
normalizeDataTagsShape(data);
normalizeDataReviewedOnShape(data);

let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
if(!Array.isArray(favorites)) favorites = [];
if(DEBUG) assertInvariants("startup");
let view = "categories";
let currentCategory = null;
let adminTab = "categories";
let adminShowReviewDates = false;

function showAppError(context, err){
  const banner = document.getElementById("appErrorBanner");
  const details = document.getElementById("appErrorDetails");
  if(!banner || !details) return;

  const message = err && err.message ? String(err.message) : String(err || "Unknown error");
  const stack = err && err.stack ? String(err.stack) : "";
  const timestamp = new Date().toISOString();
  details.textContent = [
    `Context: ${context}`,
    `Message: ${message}`,
    `Timestamp: ${timestamp}`,
    stack ? `Stack:\n${stack}` : ""
  ].filter(Boolean).join("\n");
  banner.style.display = "block";
}

function safeCall(label, fn){
  try{
    return fn();
  }catch(err){
    showAppError(label, err);
    return undefined;
  }
}

function assertInvariants(context = "invariant check"){
  if(!data || !Array.isArray(data.resources)) throw new Error(`${context}: data.resources must be an array`);
  if(!Array.isArray(data.categories)) throw new Error(`${context}: data.categories must be an array`);
  if(!Array.isArray(data.tags)) throw new Error(`${context}: data.tags must be an array`);
  if(!Array.isArray(favorites)) throw new Error(`${context}: favorites must be an array`);

  const ids = new Set();
  data.resources.forEach((resource, idx) => {
    const id = String(resource && resource.id || "");
    if(!id) throw new Error(`${context}: resource at index ${idx} is missing id`);
    if(ids.has(id)) throw new Error(`${context}: duplicate resource id '${id}'`);
    ids.add(id);

    if(!Array.isArray(resource.tags)) throw new Error(`${context}: resource '${id}' tags must be an array`);
    const tagSet = new Set(data.tags || []);
    resource.tags.forEach(tag => {
      if(!tagSet.has(tag)) throw new Error(`${context}: resource '${id}' tag '${tag}' is not in data.tags`);
    });

    if(resource.reviewedOn != null && !isValidMMYY(resource.reviewedOn)){
      throw new Error(`${context}: resource '${id}' reviewedOn must be MM/YY or null`);
    }
  });

  const resourceIds = new Set(data.resources.map(r => String(r && r.id || "")));
  const badFavorite = favorites.find(id => !resourceIds.has(String(id || "")));
  if(badFavorite) throw new Error(`${context}: favorite '${badFavorite}' does not reference a valid resource`);
}

function safeRender(label = "render"){
  return safeCall(label, () => {
    if(DEBUG) assertInvariants(`${label} pre`);
    const result = render();
    if(DEBUG) assertInvariants(`${label} post`);
    return result;
  });
}

function safeRenderAdmin(label = "renderAdmin"){
  return safeCall(label, () => {
    if(DEBUG) assertInvariants(`${label} pre`);
    const result = renderAdmin();
    if(DEBUG) assertInvariants(`${label} post`);
    return result;
  });
}

function runSelfTests(){
  const tests = [];

  tests.push({
    name: "DATA STRUCTURE",
    fn: () => {
      if(!Array.isArray(data.resources)) throw new Error("resources array missing");
      if(!Array.isArray(data.categories)) throw new Error("categories array missing");
      const ids = data.resources.map(r => String(r && r.id || ""));
      if(new Set(ids).size !== ids.length) throw new Error("resource ids are not unique");
    }
  });

  tests.push({
    name: "TAG CONSISTENCY",
    fn: () => {
      const tagSet = new Set(data.tags || []);
      data.resources.forEach(resource => {
        (resource.tags || []).forEach(tag => {
          if(!tagSet.has(tag)) throw new Error(`invalid tag '${tag}' on resource '${resource.id}'`);
        });
      });
    }
  });

  tests.push({
    name: "REVIEW DATE VALIDATION",
    fn: () => {
      data.resources.forEach(resource => {
        const value = resource.reviewedOn;
        if(value != null && !isValidMMYY(value)){
          throw new Error(`invalid reviewedOn '${value}' on resource '${resource.id}'`);
        }
      });
    }
  });

  tests.push({
    name: "RESOURCE SORTING",
    fn: () => {
      const sorted = data.resources.slice().sort((a, b) => {
        const aMonth = parseMMYYToMonthIndex(a.reviewedOn);
        const bMonth = parseMMYYToMonthIndex(b.reviewedOn);
        const aReviewed = aMonth !== null;
        const bReviewed = bMonth !== null;
        if(aReviewed !== bReviewed) return aReviewed ? -1 : 1;
        if(aReviewed && bReviewed && aMonth !== bMonth) return aMonth - bMonth;
        return compareResourcesByName(a, b);
      });
      for(let i = 1; i < sorted.length; i += 1){
        const prev = sorted[i - 1];
        const curr = sorted[i];
        const prevMonth = parseMMYYToMonthIndex(prev.reviewedOn);
        const currMonth = parseMMYYToMonthIndex(curr.reviewedOn);
        if(prevMonth === null && currMonth !== null){
          throw new Error("unreviewed resource appears before reviewed resource");
        }
      }
    }
  });

  tests.push({
    name: "SERVICES RENDERER",
    fn: () => {
      const html = renderServicesHTML("One\n\n* bullet\n---\n**bold**");
      if(typeof html !== "string" || !html.length) throw new Error("renderer returned empty output");
    }
  });

  const results = tests.map(test => {
    try{
      test.fn();
      return { ok:true, name:test.name, message:"" };
    }catch(err){
      return { ok:false, name:test.name, message:(err && err.message) ? err.message : String(err) };
    }
  });

  const panel = document.getElementById("selfTestPanel");
  const resultsEl = document.getElementById("selfTestResults");
  if(panel && resultsEl){
    resultsEl.innerHTML = "";
    results.forEach(result => {
      const row = document.createElement("div");
      row.textContent = result.ok
        ? `✔ PASS ${result.name}`
        : `✖ FAIL ${result.name}: ${result.message}`;
      resultsEl.appendChild(row);
    });
    panel.style.display = "block";
  }

  return results;
}

  selfTestCloseBtn.onclick = () => {
    const panel = document.getElementById("selfTestPanel");
    if(panel) panel.style.display = "none";
  };
}

function buildResourceCard(res,{expanded=false,showDescription=false,showStar=true}={}){
  normalizeResourceServices(res);

  const card=document.createElement("div");
  card.className="resource-card";

  if(showStar){
    const star=document.createElement("div");
    star.className="star"+(favorites.includes(res.id)?" fav":"");
    star.textContent="★";
    star.onclick=e=>{e.stopPropagation(); toggleFav(res.id);};
    card.appendChild(star);
  }

  const main=document.createElement("div");
  main.className="resource-main";
  main.innerHTML=`<strong>${res.name}</strong>`;
  if(showDescription && res.description) main.innerHTML+=`<div>${escapeHTML(res.description)}</div>`;

  const details=document.createElement("div");
  details.className="resource-details "+(expanded?"expanded":"collapsed");

  let html="";
  if(res.phone) html+=`<div><strong>Phone:</strong> <a href="tel:${res.phone}">${res.phone}</a></div>`;
  if(res.address) html+=`<div><strong>Address:</strong> ${escapeHTML(res.address)}</div>`;
  if(res.website) html+=`<div><strong>Website:</strong> <a href="${res.website}" target="_blank">${res.website}</a></div>`;
  if(res.servicesText) html+=`<div><strong>Services:</strong><div class="services-rendered">${renderServicesHTML(res.servicesText)}</div></div>`;

  details.innerHTML=html;
  main.appendChild(details);
  card.appendChild(main);
  return card;
}

function getCategoryFilterTags(categoryId){
  return Array.isArray(categoryTagFilters[categoryId]) ? categoryTagFilters[categoryId] : [];
}

function setCategoryFilterTags(categoryId, tags){
  const cleaned = Array.isArray(tags) ? [...new Set(tags)] : [];
  if(cleaned.length){
    categoryTagFilters[categoryId] = cleaned;
  }else{
    delete categoryTagFilters[categoryId];
  }
}

function clearAllCategoryFilters(shouldRender = true){
  categoryTagFilters = {};
  if(shouldRender && view === "category") safeRender();
}

function getUndoSnapshot(){
  try{
    const raw = localStorage.getItem(UNDO_STORAGE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || typeof parsed !== "object") return null;
    if(!parsed.dataSnapshot || typeof parsed.message !== "string") return null;
    return parsed;
  }catch(_err){
    return null;
  }
}

function clearUndoSnapshot(){
  localStorage.removeItem(UNDO_STORAGE_KEY);
}

function setUndoSnapshot(message){
  localStorage.setItem(UNDO_STORAGE_KEY, JSON.stringify({
    dataSnapshot: JSON.parse(JSON.stringify(data)),
    message: String(message || "")
  }));
}

function undoLastDeletion(){
  const snapshot = getUndoSnapshot();
  if(!snapshot || !snapshot.dataSnapshot) return;
  data = snapshot.dataSnapshot;
  normalizeDataServicesShape(data);
  normalizeDataTagsShape(data);
  normalizeDataReviewedOnShape(data);
  adminCheckedTags = [];
  clearUndoSnapshot();
  persist();
  safeRender();
}

function pruneDeletedTagsFromFilters(deletedTags){
  if(!Array.isArray(deletedTags) || !deletedTags.length) return;
  const deleted = new Set(deletedTags);
  Object.keys(categoryTagFilters).forEach(categoryId => {
    const existing = Array.isArray(categoryTagFilters[categoryId]) ? categoryTagFilters[categoryId] : [];
    const next = existing.filter(tag => !deleted.has(tag));
    if(next.length){
      categoryTagFilters[categoryId] = next;
    }else{
      delete categoryTagFilters[categoryId];
    }
  });
}

function createChecklistPanel({buttonText, selectedTags, allTags, onToggle, onAddTag, selectedPrefix}){
  const wrapper = document.createElement("div");
  wrapper.style.position = "relative";
  wrapper.style.display = "inline-block";

  const btn = document.createElement("button");
  btn.className = "button";
  btn.textContent = buttonText;
  wrapper.appendChild(btn);

  const panel = document.createElement("div");
  panel.style.position = "absolute";
  panel.style.zIndex = "20";
  panel.style.top = "36px";
  panel.style.left = "0";
  panel.style.width = "280px";
  panel.style.maxHeight = "280px";
  panel.style.overflow = "auto";
  panel.style.padding = "10px";
  panel.style.border = "1px solid #ccc";
  panel.style.borderRadius = "6px";
  panel.style.background = "#fff";
  panel.style.boxShadow = "0 2px 8px rgba(0,0,0,.15)";
  panel.style.display = "none";
  wrapper.appendChild(panel);

  const selectedLine = document.createElement("div");
  selectedLine.style.marginTop = "8px";
  selectedLine.style.fontSize = "13px";
  wrapper.appendChild(selectedLine);

  function refreshSelectedLine(){
    selectedLine.textContent = `${selectedPrefix} ${selectedTags.length ? selectedTags.join(", ") : "(none)"}`;
  }

  function refreshChecklist(){
    panel.innerHTML = "";

    if(!allTags.length){
      const empty = document.createElement("div");
      empty.textContent = "No tags available.";
      empty.style.fontSize = "13px";
      empty.style.marginBottom = "8px";
      panel.appendChild(empty);
    }

    allTags.forEach(tag => {
      const row = document.createElement("label");
      row.style.display = "block";
      row.style.marginBottom = "6px";
      const checked = selectedTags.includes(tag) ? "checked" : "";
      row.innerHTML = `<input type="checkbox" data-tag="${escapeHTML(tag)}" ${checked}> ${escapeHTML(tag)}`;
      const input = row.querySelector("input");
      input.onchange = () => {
        onToggle(tag, input.checked);
        refreshSelectedLine();
      };
      panel.appendChild(row);
    });

    if(typeof onAddTag === "function"){
      const divider = document.createElement("div");
      divider.style.borderTop = "1px solid #ddd";
      divider.style.margin = "10px 0";
      panel.appendChild(divider);

      const label = document.createElement("label");
      label.textContent = "New tag";
      label.style.display = "block";
      label.style.fontSize = "13px";
      label.style.marginBottom = "4px";
      panel.appendChild(label);

      const row = document.createElement("div");
      row.style.display = "flex";
      row.style.gap = "6px";

      const input = document.createElement("input");
      input.type = "text";
      input.style.flex = "1";
      input.setAttribute("aria-label", "New tag");

      const addBtn = document.createElement("button");
      addBtn.className = "button";
      addBtn.textContent = "Add";

      function addTag(){
        const maybeNewTag = input.value;
        const result = onAddTag(maybeNewTag);
        if(result && result.added){
          input.value = "";
          refreshChecklist();
          refreshSelectedLine();
          input.focus();
        }
      }

      addBtn.onclick = addTag;
      input.addEventListener("keydown", (e) => {
        if(e.key === "Enter"){
          e.preventDefault();
          addTag();
        }
      });

      row.appendChild(input);
      row.appendChild(addBtn);
      panel.appendChild(row);
    }
  }

  btn.onclick = (e) => {
    e.stopPropagation();
    panel.style.display = panel.style.display === "none" ? "block" : "none";
    if(panel.style.display === "block") refreshChecklist();
  };

  panel.addEventListener("click", e => e.stopPropagation());

  const outsideHandler = (e) => {
    if(!wrapper.contains(e.target)){
      panel.style.display = "none";
      document.removeEventListener("click", outsideHandler, true);
    }
  };
  btn.addEventListener("click", () => {
    document.removeEventListener("click", outsideHandler, true);
    if(panel.style.display === "block"){
      setTimeout(() => document.addEventListener("click", outsideHandler, true), 0);
    }
  });

  refreshSelectedLine();
  return wrapper;
}

/* ---------- Render ---------- */

function render(){
  tabFavorites.textContent=`Favorites (${favorites.length})`;
  appView.classList.toggle("hidden", view==="admin");
  adminView.classList.toggle("hidden", view!=="admin");

  if(view !== "admin"){
    editing = null;
    editorSnapshot = "";
  }

  if(view==="admin"){ safeRenderAdmin(); return; }

  appView.innerHTML="";

  if(view==="categories"){
    const grid=document.createElement("div");
    grid.className="grid";

    data.categories.slice().sort((a,b)=>(a.displayOrder??999)-(b.displayOrder??999)).forEach(cat=>{
      const card=document.createElement("div");
      card.className="category-card";
      card.innerHTML=`<strong>${cat.label}</strong>`;
      card.onclick=()=>{ currentCategory=cat.id; view="category"; safeRender(); };
      grid.appendChild(card);
    });

    appView.appendChild(grid);
  }

  if(view==="category"){
    const controls = document.createElement("div");
    controls.style.display = "flex";
    controls.style.flexWrap = "wrap";
    controls.style.gap = "8px";
    controls.style.marginBottom = "8px";
    controls.style.alignItems = "center";

    const back=document.createElement("button");
    back.className = "button";
    back.textContent="← Back";
    back.onclick=()=>{ view="categories"; safeRender(); };
    controls.appendChild(back);

    const appliedSelectedTags = [...getCategoryFilterTags(currentCategory)];
    let stagedSelectedTags = appliedSelectedTags.slice();

    const filterWrap = document.createElement("div");
    filterWrap.style.position = "relative";
    filterWrap.style.display = "inline-block";

    const filterBtn = document.createElement("button");
    filterBtn.className = "button";
    filterBtn.textContent = "Filter";
    filterWrap.appendChild(filterBtn);

    const filterPanel = document.createElement("div");
    filterPanel.style.position = "absolute";
    filterPanel.style.zIndex = "20";
    filterPanel.style.top = "36px";
    filterPanel.style.left = "0";
    filterPanel.style.width = "280px";
    filterPanel.style.maxHeight = "280px";
    filterPanel.style.overflow = "auto";
    filterPanel.style.padding = "10px";
    filterPanel.style.border = "1px solid #ccc";
    filterPanel.style.borderRadius = "6px";
    filterPanel.style.background = "#fff";
    filterPanel.style.boxShadow = "0 2px 8px rgba(0,0,0,.15)";
    filterPanel.style.display = "none";
    filterWrap.appendChild(filterPanel);

    let outsideHandler = null;
    function closeFilterPanel(){
      filterPanel.style.display = "none";
      if(outsideHandler){
        document.removeEventListener("click", outsideHandler, true);
        outsideHandler = null;
      }
    }

    function refreshFilterPanel(){
      filterPanel.innerHTML = "";

      if(!data.tags.length){
        const empty = document.createElement("div");
        empty.textContent = "No tags available.";
        empty.style.fontSize = "13px";
        empty.style.marginBottom = "8px";
        filterPanel.appendChild(empty);
      }

      data.tags.forEach(tag => {
        const row = document.createElement("label");
        row.style.display = "block";
        row.style.marginBottom = "6px";
        const checked = stagedSelectedTags.includes(tag) ? "checked" : "";
        row.innerHTML = `<input type="checkbox" data-tag="${escapeHTML(tag)}" ${checked}> ${escapeHTML(tag)}`;
        const input = row.querySelector("input");
        input.onchange = () => {
          const i = stagedSelectedTags.indexOf(tag);
          if(input.checked && i === -1) stagedSelectedTags.push(tag);
          if(!input.checked && i !== -1) stagedSelectedTags.splice(i, 1);
        };
        filterPanel.appendChild(row);
      });

      const actions = document.createElement("div");
      actions.style.marginTop = "10px";

      const okBtn = document.createElement("button");
      okBtn.className = "button primary";
      okBtn.textContent = "OK";
      okBtn.onclick = (e) => {
        e.stopPropagation();
        closeFilterPanel();
        setCategoryFilterTags(currentCategory, stagedSelectedTags);
        safeRender();
      };
      actions.appendChild(okBtn);
      filterPanel.appendChild(actions);
    }

    filterBtn.onclick = (e) => {
      e.stopPropagation();
      const isOpen = filterPanel.style.display === "block";
      if(isOpen){
        stagedSelectedTags = appliedSelectedTags.slice();
        closeFilterPanel();
        return;
      }
      stagedSelectedTags = appliedSelectedTags.slice();
      refreshFilterPanel();
      filterPanel.style.display = "block";
      outsideHandler = (event) => {
        if(!filterWrap.contains(event.target)){
          stagedSelectedTags = appliedSelectedTags.slice();
          closeFilterPanel();
        }
      };
      setTimeout(() => document.addEventListener("click", outsideHandler, true), 0);
    };

    filterPanel.addEventListener("click", (e) => e.stopPropagation());
    controls.appendChild(filterWrap);

    if(appliedSelectedTags.length){
      const summary = document.createElement("span");
      summary.style.fontSize = "13px";
      summary.style.whiteSpace = "nowrap";
      summary.textContent = `Selected tags: ${appliedSelectedTags.join(", ")}`;
      controls.appendChild(summary);
    }

    appView.appendChild(controls);

    const cat = data.categories.find(c => c.id === currentCategory);
    if(cat){
      const title = document.createElement("div");
      title.textContent = cat.label;
      title.style.fontWeight = "bold";
      title.style.fontSize = "1.2em";
      title.style.marginBottom = "12px";
      appView.appendChild(title);
    }

    const activeTags = getCategoryFilterTags(currentCategory);
    const activeTagSet = new Set(activeTags);

    const filtered = data.resources.filter(r => {
      if(!r.categories?.includes(currentCategory)) return false;
      if(activeTags.length === 0) return true;
      if(!Array.isArray(r.tags) || r.tags.length === 0) return false;
      return r.tags.some(t => activeTagSet.has(t));
    });

    if(!filtered.length){
      const empty = document.createElement("p");
      empty.textContent = "No resources match the selected tags.";
      appView.appendChild(empty);
    }

    filtered.forEach(res=>{
      let expanded=false;
      const card=buildResourceCard(res,{showDescription:true});
      card.onclick=()=>{
        expanded=!expanded;
        const d=card.querySelector(".resource-details");
        d.classList.toggle("collapsed",!expanded);
        d.classList.toggle("expanded",expanded);
      };
      appView.appendChild(card);
    });
  }

  if(view==="favorites"){
    const { normalFavs, listFavs } = getFavoritePrintGroups();
    const favs=[...normalFavs, ...listFavs];
    if(!favs.length){ appView.innerHTML="<p>No favorites selected.</p>"; return; }

    if(normalFavs.length){
      const btn=document.createElement("button");
      btn.textContent="Print Preview";
      btn.className="button primary";
      btn.onclick=printFavorites;
      appView.appendChild(btn);
    }

    if(listFavs.length){
      const heading=document.createElement("div");
      heading.textContent="Print Lists";
      heading.style.fontWeight="bold";
      heading.style.margin="12px 0 8px";
      appView.appendChild(heading);

      listFavs.forEach(res=>{
        const btn=document.createElement("button");
        btn.textContent=`Print "${res.name}"`;
        btn.className="button";
        btn.style.marginRight="8px";
        btn.style.marginBottom="8px";
        btn.onclick=()=>printSingleListResource(res.id);
        appView.appendChild(btn);
      });
    }

    favs.forEach(res=> appView.appendChild(buildResourceCard(res,{expanded:true})));
  }
}

/* ---------- Favorites ---------- */

function toggleFav(id){
  const set=new Set(favorites);
  set.has(id)?set.delete(id):set.add(id);
  favorites=[...set];
  localStorage.setItem("favorites",JSON.stringify(favorites));
  safeRender();
}

/* ---------- Print ---------- */

function getFavoritePrintGroups(){
  const normalFavs = [];
  const listFavs = [];

  data.resources.filter(r=>favorites.includes(r.id)).forEach(res => {
    if(Array.isArray(res.tags) && res.tags.includes("This resource is a list")){
      listFavs.push(res);
    }else{
      normalFavs.push(res);
    }
  });

  return { normalFavs, listFavs };
}

function openPrintPreview(resources){
  printContent.innerHTML="<h2>Suggested Resources</h2>";
  resources.forEach(res=>{
    const card=buildResourceCard(res,{expanded:true,showStar:false});
    printContent.appendChild(card);
  });
  printModal.classList.remove("hidden");
}

function printFavorites(){
  const { normalFavs } = getFavoritePrintGroups();
  openPrintPreview(normalFavs);
}

function printSingleListResource(resourceId){
  const { listFavs } = getFavoritePrintGroups();
  const resource = listFavs.find(res => res.id === resourceId);
  if(!resource) return;
  openPrintPreview([resource]);
}

function closePrintPreview(){ printModal.classList.add("hidden"); }

function doPrint(){
  printInitiatedByButton = true;
  window.print();
  clearAllCategoryFilters(false);
}

// ============================================================
// PERSISTENCE
// ============================================================

function persist(){
  if(DEBUG) assertInvariants("persist");
  data.lastModified = nowISO();
  localStorage.setItem("tsoData", JSON.stringify(data));
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "tso-resources.json";
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

function importJSON(event){
  if(!commitPendingEditsIfChanged()) return;

  const file = event.target.files && event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try{
      const imported = JSON.parse(reader.result);

      // Normalize legacy services[] -> servicesText and ensure tags shape.
      if(imported && imported.resources){
        imported.resources.forEach(r => normalizeResourceServices(r));
      }
      normalizeDataTagsShape(imported);
      normalizeDataReviewedOnShape(imported);

      data = imported;
      persist();
      alert("Load complete.");
      safeRender();
    }catch(e){
      alert("Load failed: " + e.message);
    }
  };
  reader.readAsText(file);

  // allow re-import of same filename
  event.target.value = "";
}

function categoryEditorDraft(){
  const idEl = document.getElementById("cat_id");
  const labelEl = document.getElementById("cat_label");
  const orderEl = document.getElementById("cat_order");
  const activeEl = document.getElementById("cat_active");
  if(!idEl || !labelEl || !orderEl || !activeEl) return null;
  return {
    id: idEl.value.trim(),
    label: labelEl.value.trim(),
    displayOrder: orderEl.value,
    active: !!activeEl.checked
  };
}

function resourceEditorDraft(){
  const nameEl = document.getElementById("res_name");
  const phoneEl = document.getElementById("res_phone");
  const addressEl = document.getElementById("res_address");
  const websiteEl = document.getElementById("res_website");
  const hoursEl = document.getElementById("res_hours");
  const descEl = document.getElementById("res_description");
  const servicesEl = document.getElementById("res_services");
  if(!nameEl || !phoneEl || !addressEl || !websiteEl || !hoursEl || !descEl || !servicesEl) return null;
  const reviewedEl = document.getElementById("res_reviewed_on");
  const reviewedOn = reviewedEl ? reviewedEl.value.trim() : "";

  const tags = Array.from(document.querySelectorAll(".resTag"))
    .filter(cb => cb.checked)
    .map(cb => cb.value)
    .sort((a,b)=>a.localeCompare(b));

  return {
    name: nameEl.value.trim(),
    phone: phoneEl.value.trim(),
    address: addressEl.value.trim(),
    website: websiteEl.value.trim(),
    hours: hoursEl.value.trim(),
    description: descEl.value,
    servicesText: servicesEl.value,
    reviewedOn,
    categories: Array.from(document.querySelectorAll(".resCat"))
      .filter(cb=>cb.checked)
      .map(cb=>cb.value)
      .sort(),
    tags
  };
}

function getResourceIndexById(resourceId){
  if(!resourceId) return -1;
  return data.resources.findIndex(r => r && r.id === resourceId);
}

function validateResourceName(draft, idx){
  const name = String(draft && draft.name || "").trim();
  if(!name){
    return { valid:false, message:"Name is required." };
  }
  const lower = name.toLowerCase();
  const duplicate = data.resources.some((r, i) => i !== idx && String(r && r.name || "").trim().toLowerCase() === lower);
  if(duplicate){
    return { valid:false, message:"Another resource already uses this name." };
  }
  return { valid:true, message:"" };
}

function showResourceNameWarning(message){
  const warning = document.getElementById("res_name_warning");
  if(!warning) return;
  warning.textContent = message || "";
  warning.style.display = message ? "block" : "none";
}

function showResourceReviewWarning(message){
  const warning = document.getElementById("res_review_warning");
  if(!warning) return;
  warning.textContent = message || "";
}

function snapshotCategoryEditor(){
  const draft = categoryEditorDraft();
  return draft ? JSON.stringify(draft) : "";
}

function snapshotResourceEditor(){
  const draft = resourceEditorDraft();
  return draft ? JSON.stringify(draft) : "";
}

function applyCategoryDraft(idx, draft){
  const cat = data.categories[idx];
  if(!cat) return;
  cat.id = draft.id || cat.id;
  cat.label = draft.label || cat.label;
  cat.displayOrder = draft.displayOrder === "" ? null : Number(draft.displayOrder);
  cat.active = draft.active;
  cat.lastModified = nowISO();
}

function openCategoryOrderEditor(){
  if(!commitPendingEditsIfChanged()) return;
  const rows = data.categories.map((cat, idx) => {
    const rawOrder = cat.displayOrder;
    const numericOrder = rawOrder == null || rawOrder === "" ? null : Number(rawOrder);
    return {
      idx,
      label: cat.label || "",
      order: Number.isFinite(numericOrder) ? numericOrder : null,
      value: rawOrder == null ? "" : String(rawOrder)
    };
  });
  rows.sort((a, b) => {
    const aMissing = a.order == null;
    const bMissing = b.order == null;
    if(aMissing !== bMissing) return aMissing ? 1 : -1;
    if(!aMissing && a.order !== b.order) return a.order - b.order;
    const labelCmp = a.label.localeCompare(b.label);
    if(labelCmp !== 0) return labelCmp;
    return a.idx - b.idx;
  });
  adminCategoryOrderEditorOpen = true;
  adminCategoryOrderDraft = rows.map(row => ({ idx: row.idx, value: row.value }));
  safeRenderAdmin();
}

function closeCategoryOrderEditor(shouldRender = true){
  adminCategoryOrderEditorOpen = false;
  adminCategoryOrderDraft = null;
  if(shouldRender) safeRenderAdmin();
}

function applyCategoryOrderEditor(){
  const draft = Array.isArray(adminCategoryOrderDraft)
    ? adminCategoryOrderDraft.map((row, pos) => ({
      idx: Number(row && row.idx),
      value: row && typeof row.value === "string" ? row.value : "",
      pos
    }))
    : [];
  // Close first to avoid visible panel flicker during render/update.
  adminCategoryOrderEditorOpen = false;
  adminCategoryOrderDraft = null;

  const sortedRows = draft
    .filter(row => Number.isInteger(row.idx) && row.idx >= 0 && row.idx < data.categories.length)
    .map(row => {
      const raw = row.value.trim();
      const numeric = raw === "" ? null : Number(raw);
      return {
        idx: row.idx,
        pos: row.pos,
        label: (data.categories[row.idx] && data.categories[row.idx].label) || "",
        order: raw === "" || !Number.isFinite(numeric) ? null : numeric
      };
    });

  sortedRows.sort((a, b) => {
    const aMissing = a.order == null;
    const bMissing = b.order == null;
    if(aMissing !== bMissing) return aMissing ? 1 : -1;
    if(!aMissing && a.order !== b.order) return a.order - b.order;
    const labelCmp = a.label.localeCompare(b.label);
    if(labelCmp !== 0) return labelCmp;
    return a.pos - b.pos;
  });

  let changed = false;
  sortedRows.forEach((row, orderIdx) => {
    const cat = data.categories[row.idx];
    if(!cat) return;
    const nextDisplayOrder = (orderIdx + 1) * 10;
    const prevRaw = cat.displayOrder;
    const prevDisplayOrder = prevRaw == null || prevRaw === "" ? null : Number(prevRaw);
    if(prevDisplayOrder !== nextDisplayOrder){
      cat.displayOrder = nextDisplayOrder;
      cat.lastModified = nowISO();
      changed = true;
    }
  });

  if(changed) persist();
  safeRenderAdmin();
}

function applyResourceDraft(idx, draft){
  const res = data.resources[idx];
  if(!res) return;
  res.name = draft.name || res.name;
  res.phone = draft.phone;
  res.address = draft.address;
  res.website = draft.website;
  res.hours = draft.hours;
  res.description = draft.description;
  res.servicesText = draft.servicesText;
  const reviewValidation = validateReviewedOnInput(draft.reviewedOn);
  res.reviewedOn = reviewValidation.valid ? reviewValidation.normalized : null;
  res.categories = draft.categories;
  res.tags = draft.tags || [];
  res.lastModified = nowISO();
}

function commitPendingEditsIfChanged(){
  if(!editing) return true;

  let nextSnapshot = "";
  if(editing.kind === "category"){
    nextSnapshot = snapshotCategoryEditor();
    if(!nextSnapshot) return true;
    if(nextSnapshot !== editorSnapshot){
      applyCategoryDraft(editing.idx, JSON.parse(nextSnapshot));
      persist();
      editorSnapshot = nextSnapshot;
    }
    return true;
  }

  if(editing.kind === "resource"){
    nextSnapshot = snapshotResourceEditor();
    if(!nextSnapshot) return true;
    const draft = JSON.parse(nextSnapshot);
    const validation = validateResourceName(draft, editing.idx);
    const reviewValidation = validateReviewedOnInput(draft.reviewedOn);
    showResourceNameWarning(validation.message);
    showResourceReviewWarning(reviewValidation.message);
    if(!validation.valid){
      const nameInput = document.getElementById("res_name");
      if(nameInput) nameInput.focus();
      return false;
    }
    if(!reviewValidation.valid){
      const reviewInput = document.getElementById("res_reviewed_on");
      if(reviewInput) reviewInput.focus();
      return false;
    }
    if(nextSnapshot !== editorSnapshot){
      applyResourceDraft(editing.idx, draft);
      persist();
      editorSnapshot = nextSnapshot;
      const saved = data.resources[editing.idx];
      if(saved && saved.id) selectedResourceId = saved.id;
    }
    return true;
  }
  return true;
}

function newCategory(){
  if(!commitPendingEditsIfChanged()) return;
  const newIndex = data.categories.length;

  data.categories.push({
    id: "",
    label: "",
    active: true,
    lastModified: nowISO(),
    displayOrder: null
  });

  persist();
  adminTab = "categories";
  safeRenderAdmin();

  const sel = document.getElementById("catSelect");
  if(sel){
    sel.value = String(newIndex);
    editCategory(newIndex);
    const idInput = document.getElementById("cat_id");
    if(idInput) idInput.focus();
  }
}

function deleteCategory(){
  if(!commitPendingEditsIfChanged()) return;
  const sel = document.getElementById("catSelect");
  if(!sel || !sel.value) return;

  const idx = parseInt(sel.value,10);
  const cat = data.categories[idx];
  if(!cat) return;

  const confirmDelete = confirm(buildAdminDeleteConfirmation("category", cat.label || "(unnamed)"));
  if(!confirmDelete) return;
  setUndoSnapshot(`deleted category "${cat.label}"`);

  // remove category from resources too
  data.resources.forEach(r=>{
    if(Array.isArray(r.categories)){
      r.categories = r.categories.filter(id => id !== cat.id);
    }
  });

  data.categories.splice(idx,1);
  delete categoryTagFilters[cat.id];
  persist();
  safeRenderAdmin();
}

function editCategory(idx){
  const cat = data.categories[idx];
  const editor = document.getElementById("catEditor");
  if(!cat || !editor) return;

  editor.innerHTML = `
    <h3>Edit Category</h3>

    <label>ID<br>
      <input id="cat_id" value="${escapeHTML(cat.id || "")}">
    </label><br><br>

    <label>Label<br>
      <input id="cat_label" value="${escapeHTML(cat.label || "")}">
    </label><br><br>

    <label>Display order (optional)<br>
      <input id="cat_order" type="number" value="${cat.displayOrder ?? ""}">
    </label><br><br>

    <label>
      <input id="cat_active" type="checkbox" ${cat.active ? "checked" : ""}>
      Active
    </label><br><br>
  `;

  editing = { kind: "category", idx };
  editorSnapshot = snapshotCategoryEditor();
}

      <div id="adminTagDeleteList" style="max-height:220px; overflow:auto; border:1px solid #ddd; border-radius:6px; padding:8px; margin-bottom:8px;"></div>
      <div style="display:flex; gap:6px; align-items:center; margin-bottom:8px;">

      </div>

        <button id="doneTagsBtn" class="button" type="button" onclick="closeManageTags()">Done</button>
      </div>
    </div>
  `;
}

function setupAdminManageTagsPanel(){
  if(adminManageTagsOpen){
    renderAdminTagDeleteList();

    const addBtn = document.getElementById("adminAddTagBtn");
    const input = document.getElementById("adminNewTagInput");
    if(addBtn && input){
      const doAdd = () => {
        if(!commitPendingEditsIfChanged()) return;
        const value = input.value;
        const result = addGlobalTag(value);
        if(result && result.added){
          input.value = "";
          renderAdminTagDeleteList();
          if(adminResourceEditMode && selectedResourceId){
            const idx = getResourceIndexById(selectedResourceId);
            if(idx !== -1) editResource(idx);
          }
          input.focus();
        }
      };
      addBtn.onclick = doAdd;
      input.addEventListener("keydown", (e) => {
        if(e.key === "Enter"){
          e.preventDefault();
          doAdd();
        }
      });
    }

    const panel = document.getElementById("adminManageTagsPanel");
    const outsideHandler = (e) => {
      if(panel && !panel.contains(e.target)){
        document.removeEventListener("click", outsideHandler, true);
        closeManageTags();
      }
    };
    setTimeout(() => document.addEventListener("click", outsideHandler, true), 0);

    if(panel) panel.addEventListener("click", (e) => e.stopPropagation());
  }else{
    updateDeleteCheckedTagsButtonState();
  }
}

function renderAdminResources(container){
  adminCheckedTags = adminCheckedTags.filter(tag => data.tags.includes(tag));
  if(adminResourceEditMode && !selectedResourceId && data.resources[0] && data.resources[0].id){
    selectedResourceId = data.resources[0].id;
  }

  if(!adminResourceEditMode){
    container.innerHTML += `
      <div class="admin-panel">
        <div class="admin-box">
          <h3>Resources</h3>
          <div class="resource-browse-wrap">

              Show review dates
            </label>

            <div class="resource-browse-actions">
              <button class="button" onclick="newResource()">New</button>
              <button class="button danger" onclick="deleteResource()">Delete</button>
              <button class="button" onclick="adminManageTagsOpen ? closeManageTags() : openManageTags()">Manage tags</button>
              <span class="spacer"></span>
              <button class="button primary" onclick="openResourceEditor()">Edit</button>
            </div>
            ${renderAdminManageTagsSection()}
          </div>
        </div>
      </div>
    `;

    const sel = document.getElementById("resSelect");
    const sortToggle = document.getElementById("resSortShowReview");
    if(sortToggle){
      sortToggle.checked = adminShowReviewDates;
      sortToggle.onchange = () => {
        adminShowReviewDates = !!sortToggle.checked;
        populateResourceSelectOptions(sel, selectedResourceId);
      };
    }

    populateResourceSelectOptions(sel, selectedResourceId);
    sel.onchange = () => { selectedResourceId = sel.value || ""; };
    sel.ondblclick = () => {
      if(document.activeElement !== sel) return;
      openResourceEditor();
    };
    sel.onkeydown = (e) => {
      if(document.activeElement !== sel) return;
      if(e.key === "Enter"){
        e.preventDefault();
        openResourceEditor();
        return;
      }
      if(e.key === "Delete"){
        e.preventDefault();
        deleteResource();
      }
    };
    setupAdminManageTagsPanel();

    editing = null;
    editorSnapshot = "";
    return;
  }

  const idx = getResourceIndexById(selectedResourceId);
  if(idx === -1){
    adminResourceEditMode = false;
    adminAssignTagsOpen = false;
    adminAssignTagsDraft = [];
    safeRenderAdmin();
    return;
  }

  container.innerHTML += `
    <div class="admin-panel">
      <div class="admin-box">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">

          <button id="res_done_btn" class="button primary" onclick="closeResourceEditor()">Done</button>
        </div>
        <div id="resEditor" style="margin-top:12px;"></div>
      </div>
    </div>
  `;

  editResource(idx);
  setupAdminManageTagsPanel();

function populateResourceSelectOptions(sel, preferredResourceId){
  if(!sel) return;
  const prev = preferredResourceId || selectedResourceId || sel.value || "";
  sel.innerHTML = "";

  getAdminResourceBrowseList().forEach((r) => {
      const opt = document.createElement("option");
      opt.value = String(r.id || "");
      opt.textContent = adminShowReviewDates
        ? `${r.name || ""} \u2014 ${formatReviewedOnForDisplay(r.reviewedOn)}`
        : (r.name || "");
      sel.appendChild(opt);
    });

  if(prev && Array.from(sel.options).some(opt => opt.value === prev)){
    sel.value = prev;
    selectedResourceId = prev;
    return;
  }

  if(sel.options.length){
    sel.value = sel.options[0].value;
    selectedResourceId = sel.value;
  }else{
    selectedResourceId = "";
  }
}

function newResource(){
  if(!commitPendingEditsIfChanged()) return;

  const resource = {
    id: generateResourceId(),
    name: "",
    description: "",
    servicesText: "",
    tags: [],
    reviewedOn: null
  };
  data.resources.push(resource);

  persist();
  adminTab = "resources";
  selectedResourceId = resource.id;
  adminResourceEditMode = true;
  adminAssignTagsOpen = false;
  adminAssignTagsDraft = [];
  safeRenderAdmin();
  focusAndSelectResourceName();
}

function deleteResource(){
  if(!commitPendingEditsIfChanged()) return;
  if(!selectedResourceId) return;

  const sortedIds = getAdminResourceBrowseList().map(r => String(r.id || ""));
  const selectedPos = sortedIds.indexOf(selectedResourceId);
  const idx = getResourceIndexById(selectedResourceId);
  const res = data.resources[idx];
  if(!res) return;

  const confirmDelete = confirm(buildAdminDeleteConfirmation("resource", res.name || "(unnamed)"));
  if(!confirmDelete) return;
  setUndoSnapshot(`deleted resource "${res.name}"`);

  data.resources.splice(idx,1);

  const remainingIds = getAdminResourceBrowseList().map(r => String(r.id || ""));
  if(!remainingIds.length){
    selectedResourceId = "";
    adminResourceEditMode = false;
  }else{
    const nextPos = Math.min(Math.max(selectedPos, 0), remainingIds.length - 1);
    selectedResourceId = remainingIds[nextPos];
  }

  persist();
  safeRenderAdmin();
}

function openResourceEditor(){
  if(!selectedResourceId) return;
  adminResourceEditMode = true;
  adminAssignTagsOpen = false;
  adminAssignTagsDraft = [];
  safeRenderAdmin();
  focusAndSelectResourceName();
}

function focusAndSelectResourceName(){
  const nameInput = document.getElementById("res_name");
  if(!nameInput) return;
  nameInput.focus();
  nameInput.select();
}

function closeResourceEditor(){
  if(!commitPendingEditsIfChanged()) return;
  adminResourceEditMode = false;
  adminAssignTagsOpen = false;
  adminAssignTagsDraft = [];
  safeRenderAdmin();
}

function openAssignTagsPanel(){
  if(!commitPendingEditsIfChanged()) return;
  const idx = getResourceIndexById(selectedResourceId);
  const res = data.resources[idx];
  if(!res) return;
  if(!Array.isArray(res.tags)) res.tags = [];
  adminAssignTagsDraft = [...res.tags];
  adminAssignTagsOpen = true;
  safeRenderAdmin();
}

function closeAssignTagsPanel(){
  adminAssignTagsOpen = false;
  adminAssignTagsDraft = [];
  safeRenderAdmin();
}

function renderAssignTagsChecklist(){
  const list = document.getElementById("assignTagsList");
  const okBtn = document.getElementById("assignTagsOkBtn");
  if(!list || !okBtn) return;

  list.innerHTML = "";
  if(!data.tags.length){
    const empty = document.createElement("div");
    empty.textContent = "No tags available.";
    list.appendChild(empty);
  }else{
    data.tags.forEach(tag => {
      const row = document.createElement("label");
      row.style.display = "block";
      row.style.marginBottom = "6px";
      const checked = adminAssignTagsDraft.includes(tag) ? "checked" : "";
      row.innerHTML = `<input type="checkbox" data-tag="${escapeHTML(tag)}" ${checked}> ${escapeHTML(tag)}`;
      const input = row.querySelector("input");
      input.onchange = () => {
        const i = adminAssignTagsDraft.indexOf(tag);
        if(input.checked && i === -1) adminAssignTagsDraft.push(tag);
        if(!input.checked && i !== -1) adminAssignTagsDraft.splice(i, 1);
      };
      list.appendChild(row);
    });
  }

  okBtn.onclick = () => {
    const idx = getResourceIndexById(selectedResourceId);
    const res = data.resources[idx];
    if(!res) return;
    res.tags = [...new Set(adminAssignTagsDraft)].sort((a,b) => a.localeCompare(b));
    res.lastModified = nowISO();
    persist();
    closeAssignTagsPanel();
  };
}

function updateDeleteCheckedTagsButtonState(){
  const btn = document.getElementById("deleteTagsBtn");
  if(!btn) return;
  btn.disabled = adminCheckedTags.length === 0;
}

function toggleAdminTagChecked(tag, checked){
  if(checked){
    if(!adminCheckedTags.includes(tag)) adminCheckedTags.push(tag);
  }else{
    adminCheckedTags = adminCheckedTags.filter(t => t !== tag);
  }
  updateDeleteCheckedTagsButtonState();
}

function deleteCheckedTags(){
  if(!commitPendingEditsIfChanged()) return;
  // Clicking Delete checked tags closes Manage Tags (unit of work).
  if(adminManageTagsOpen){
    adminManageTagsOpen = false;
    adminManageTagsSnapshot = "";
  }
  const checkedTags = adminCheckedTags.filter(tag => data.tags.includes(tag));
  if(!checkedTags.length) return;

  const isSingle = checkedTags.length === 1;
  const label = checkedTags.join(", ");
  const question = isSingle
    ? `Are you sure you want to delete the tag "${checkedTags[0]}"?`
    : `Are you sure you want to delete these tags: ${label}?`;
  const detail = "This removes the tag(s) from all resources and from any active filters. You can undo this once from Admin.";
  if(!confirm(`${question}\n\n${detail}`)) return;

  const undoMessage = isSingle
    ? `deleted tag "${checkedTags[0]}"`
    : `deleted tags "${label}"`;
  setUndoSnapshot(undoMessage);

  const deleted = new Set(checkedTags);
  data.tags = data.tags.filter(tag => !deleted.has(tag));
  data.resources.forEach(resource => {
    if(Array.isArray(resource.tags)){
      resource.tags = resource.tags.filter(tag => !deleted.has(tag));
    }
  });
  pruneDeletedTagsFromFilters(checkedTags);
  adminCheckedTags = [];
  persist();
  safeRenderAdmin();
}

function addGlobalTag(newTagRaw){
  const trimmed = String(newTagRaw || "").trim();
  if(!trimmed) return { added:false, reason:"empty" };

  const exists = data.tags.some(t => t.toLowerCase() === trimmed.toLowerCase());
  if(exists) return { added:false, reason:"duplicate" };

  data.tags.push(trimmed);
  data.tags.sort((a,b)=>a.localeCompare(b));
  persist();
  if(adminManageTagsOpen){
    renderAdminTagDeleteList();
  }
  return { added:true, tag:trimmed };
}

function editResource(idx){
  const res = data.resources[idx];
  const editor = document.getElementById("resEditor");
  if(!res || !editor) return;
  selectedResourceId = res.id || selectedResourceId;

  normalizeResourceServices(res);
  normalizeResourceReviewedOn(res);
  if(!Array.isArray(res.tags)) res.tags = [];
  const reviewedDisplay = formatReviewedOnForDisplay(res.reviewedOn);
  const assignedTagsLine = res.tags.length ? res.tags.join(", ") : "(none)";

  const catChecks = data.categories
    .slice()
    .sort((a,b)=>(a.displayOrder ?? 999)-(b.displayOrder ?? 999))
    .map(c=>{
      const checked = (res.categories||[]).includes(c.id) ? "checked" : "";
      return `<label style="display:block;">
        <input type="checkbox" class="resCat" value="${escapeHTML(c.id)}" ${checked}>
        ${escapeHTML(c.label)}
      </label>`;
    }).join("");

  editor.innerHTML = `
    <label>Name<br>
      <input id="res_name" value="${escapeHTML(res.name || "")}">
    </label>
    <div id="res_name_warning" style="display:none; color:#aa0000; margin-top:4px;"></div>

    <div class="resource-editor-grid" style="margin-top:10px;">
      <label>Phone<br>
        <input id="res_phone" value="${escapeHTML(res.phone || "")}">
      </label>
      <label class="span-2">Address<br>
        <input id="res_address" value="${escapeHTML(res.address || "")}">
      </label>

      <label>Website<br>
        <input id="res_website" type="url" value="${escapeHTML(res.website || "")}">
      </label>
      <label>Hours<br>
        <input id="res_hours" value="${escapeHTML(res.hours || "")}">
      </label>
      <div>
        <strong>Reviewed on</strong>
        <div class="reviewed-row" style="margin-top:4px;">
          <span id="res_reviewed_display" class="reviewed-value">${escapeHTML(reviewedDisplay)}</span>
          <button class="button" type="button" id="res_review_btn">Review</button>
        </div>
        <input id="res_reviewed_on" type="text" placeholder="MM/YY" value="${escapeHTML(res.reviewedOn || "")}" style="width:120px; margin-top:4px;">
        <div id="res_review_warning" class="reviewed-warning"></div>
      </div>
    </div>

    <label style="display:block; margin-top:8px;">Description<br>
      <textarea id="res_description" class="big">${escapeHTML(res.description || "")}</textarea>
    </label><br>

    <label>Services<br>
      <textarea id="res_services" class="big services-editor">${escapeHTML(res.servicesText || "")}</textarea>
    </label>
    <div class="services-hint">Bullets: start line with "* " | Bold: **text** | Divider: ---</div>
    <div class="services-preview-toggle">
      <button class="button primary" type="button" id="res_services_edit_btn">Edit</button>
      <button class="button" type="button" id="res_services_preview_btn">Preview</button>
    </div>
    <div id="res_services_preview" class="services-preview-box services-rendered hidden"></div><br><br>

    <div>
      <strong>Categories</strong><br>
      ${catChecks}
    </div>

    <div class="tag-controls-row">
      <button class="button" type="button" id="res_manage_tags_btn">Manage tags</button>
      <button class="button" type="button" id="res_assign_tags_btn">Assign tags</button>
      <span class="assigned-tags-line">Assigned tags: ${escapeHTML(assignedTagsLine)}</span>
    </div>
    <div id="assignTagsPanel" style="margin-top:10px; ${adminAssignTagsOpen ? "" : "display:none;"}">
      <div style="margin-bottom:8px;">Apply tags to the current resource.</div>
      <div id="assignTagsList" style="max-height:220px; overflow:auto; border:1px solid #ddd; border-radius:6px; padding:8px; margin-bottom:8px;"></div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="button primary" type="button" id="assignTagsOkBtn">OK</button>
      </div>
    </div>
    ${renderAdminManageTagsSection()}
  `;

  const selectedTags = [...res.tags].sort((a,b) => a.localeCompare(b));
  const hiddenTagContainer = document.createElement("div");
  hiddenTagContainer.style.display = "none";

  function syncHiddenTagInputs(){
    hiddenTagContainer.innerHTML = "";
    data.tags.forEach(tag => {
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.className = "resTag";
      cb.value = tag;
      cb.checked = selectedTags.includes(tag);
      hiddenTagContainer.appendChild(cb);
    });
  }

  // Hidden checklist source of truth for snapshot/commit.
  syncHiddenTagInputs();
  editor.appendChild(hiddenTagContainer);

  const reviewBtn = document.getElementById("res_review_btn");
  const reviewInput = document.getElementById("res_reviewed_on");
  const reviewDisplay = document.getElementById("res_reviewed_display");
  const reviewWarning = document.getElementById("res_review_warning");
  const nameEl = document.getElementById("res_name");
  const servicesEl = document.getElementById("res_services");
  const servicesEditBtn = document.getElementById("res_services_edit_btn");
  const servicesPreviewBtn = document.getElementById("res_services_preview_btn");
  const servicesPreviewBox = document.getElementById("res_services_preview");
  const doneBtn = document.getElementById("res_done_btn");
  const manageTagsBtn = document.getElementById("res_manage_tags_btn");
  const assignTagsBtn = document.getElementById("res_assign_tags_btn");

  function refreshServicesPreview(){
    if(!servicesEl || !servicesPreviewBox) return;
    servicesPreviewBox.innerHTML = renderServicesHTML(servicesEl.value);
  }

  function setServicesEditorMode(mode){
    if(!servicesEl || !servicesPreviewBox || !servicesEditBtn || !servicesPreviewBtn) return;
    const previewMode = mode === "preview";
    servicesEl.classList.toggle("hidden", previewMode);
    servicesPreviewBox.classList.toggle("hidden", !previewMode);
    servicesEditBtn.classList.toggle("primary", !previewMode);
    servicesPreviewBtn.classList.toggle("primary", previewMode);
    if(previewMode) refreshServicesPreview();
  }

  if(servicesEditBtn && servicesPreviewBtn){
    servicesEditBtn.onclick = () => setServicesEditorMode("edit");
    servicesPreviewBtn.onclick = () => setServicesEditorMode("preview");
  }
  if(servicesEl){
    servicesEl.addEventListener("input", refreshServicesPreview);
  }
  setServicesEditorMode("preview");

  function updateReviewedDisplayAndWarning(){
    if(!reviewInput || !reviewDisplay) return true;
    const validation = validateReviewedOnInput(reviewInput.value);
    if(reviewWarning) reviewWarning.textContent = validation.message;
    reviewDisplay.textContent = validation.valid
      ? formatReviewedOnForDisplay(validation.normalized)
      : "not reviewed";
    showResourceReviewWarning(validation.message);
    return validation.valid;
  }

  if(reviewBtn && reviewInput){
    reviewBtn.onclick = () => {
      reviewInput.value = formatMMYYFromDate(new Date());
      updateReviewedDisplayAndWarning();
      reviewInput.focus();
      reviewInput.select();
    };
    reviewInput.addEventListener("input", updateReviewedDisplayAndWarning);
  }

  function validateEditorState(){
    const draft = resourceEditorDraft();
    if(!draft){
      showResourceNameWarning("");
      showResourceReviewWarning("");
      if(doneBtn) doneBtn.disabled = false;
      return;
    }
    const nameValidation = validateResourceName(draft, idx);
    const reviewValidation = validateReviewedOnInput(draft.reviewedOn);
    showResourceNameWarning(nameValidation.message);
    showResourceReviewWarning(reviewValidation.message);
    if(doneBtn) doneBtn.disabled = !(nameValidation.valid && reviewValidation.valid);
  }

  if(manageTagsBtn){
    manageTagsBtn.onclick = () => adminManageTagsOpen ? closeManageTags() : openManageTags();
  }
  if(assignTagsBtn){
    assignTagsBtn.onclick = () => openAssignTagsPanel();
  }
  if(adminAssignTagsOpen){
    renderAssignTagsChecklist();
    const assignPanel = document.getElementById("assignTagsPanel");
    if(assignPanel){
      assignPanel.addEventListener("click", (e) => e.stopPropagation());
      const outsideHandler = (e) => {
        if(assignPanel.contains(e.target)) return;
        if(assignTagsBtn && assignTagsBtn.contains(e.target)) return;
        document.removeEventListener("click", outsideHandler, true);
        closeAssignTagsPanel();
      };
      setTimeout(() => document.addEventListener("click", outsideHandler, true), 0);
    }
  }

  if(nameEl){
    nameEl.addEventListener("input", validateEditorState);
  }
  if(reviewInput) reviewInput.addEventListener("input", validateEditorState);

  updateReviewedDisplayAndWarning();
  validateEditorState();
  focusAndSelectResourceName();

  editing = { kind: "resource", idx };
  editorSnapshot = snapshotResourceEditor();
}

/* ---------- Resource Editor Done Shortcut ---------- */
window.addEventListener("keydown", (e) => {
  const isSelfTestShortcut = e.ctrlKey && e.shiftKey && (e.key === "T" || e.key === "t");
  if(!isSelfTestShortcut) return;
  e.preventDefault();
  e.stopPropagation();
  safeCall("runSelfTests", () => runSelfTests());
}, true);

window.addEventListener("keydown", (e) => {
  const isDoneShortcut = (e.ctrlKey || e.metaKey) && e.key === "Enter";
  if(!isDoneShortcut) return;
  if(!(view === "admin" && adminTab === "resources" && adminResourceEditMode)) return;
  e.preventDefault();
  e.stopPropagation();
  closeResourceEditor();
}, true);

/* ---------- Hidden Favorites Reset Hotkey ---------- */
/*
  Ctrl + Alt + Shift + F  => clear Favorites and reload.
  No confirmation; low stakes.
*/
window.addEventListener("keydown", (e) => {
  const isFavResetCombo =
    e.ctrlKey && e.altKey && e.shiftKey &&
    (e.key === "F" || e.key === "f");

  if (!isFavResetCombo) return;

  e.preventDefault();
  e.stopPropagation();

  localStorage.removeItem("favorites");
  location.reload();
}, true);

/* ---------- Start ---------- */

safeRender();

</script>
